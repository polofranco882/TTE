# DigitalOcean App Spec (app.yaml)
# Definición definitiva para la App TTE con backend y frontend.

name: tte-app
region: nyc
services:
  - name: backend
    github:
      repo: polofranco882/TTE
      branch: digitalocean
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xs
    source_dir: backend
    dockerfile_path: Dockerfile
    # Comando de inicio explícito para el backend compilado
    run_command: npm start
    envs:
      # DATABASE_URL configuration must be added securely in DigitalOcean Dashboard -> App -> Settings -> App-Level Environment Variables

      - key: DB_SCHEMA
        scope: RUN_AND_BUILD_TIME
        value: "app"
      - key: PORT
        scope: RUN_AND_BUILD_TIME
        value: "5000"
      - key: NODE_ENV
        scope: RUN_AND_BUILD_TIME
        value: "production"
    http_port: 5000
    routes:
      - path: /api
        preserve_path_prefix: true

  - name: frontend
    github:
      repo: polofranco882/TTE
      branch: digitalocean
      deploy_on_push: true
    instance_count: 1
    instance_size_slug: basic-xxs
    source_dir: frontend
    dockerfile_path: Dockerfile
    envs:
      - key: VITE_API_URL
        scope: RUN_AND_BUILD_TIME
        value: "/api"
    http_port: 80
    routes:
      - path: /

domains:
  - domain: ttesol-english-academy-usa.com
    type: PRIMARY
  - domain: ttesol-english-academy-usa.com
    type: ALIAS
